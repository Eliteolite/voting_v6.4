<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Ballot - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Suggestion 1: Audit Trail / Ballot ID Styling */
        .ballot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .ballot-id {
            font-family: 'Courier New', Courier, monospace;
            color: var(--primary);
            font-weight: bold;
            font-size: 0.85rem;
        }

        .receipt-area {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 10px 20px;
            margin-bottom: 20px;
        }
        
        .confirm-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
        }
        .confirm-row:last-child { border-bottom: none; }
        
        .pos-label { 
            color: var(--primary);
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 4px;
            display: block;
        }

        .candidate-val { 
            font-size: 1.1rem;
            color: #f8fafc;
        }
        
        /* Warning Text Styling */
        .final-warning {
            background: rgba(251, 113, 133, 0.1);
            border: 1px solid rgba(251, 113, 133, 0.2);
            color: #fb7185;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-top: 20px;
            text-align: center;
            font-weight: 500;
        }

        /* Suggestion 2: Micro-interaction button state */
        .edit-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .edit-btn:hover { background: var(--primary); color: #020617; }
    </style>
</head>
<body>
<div class="container" style="max-width: 650px;">
    <header>
        <h1>NTIC - KANO</h1>
        <p>Ballot Verification</p>
    </header>

    <div class="card">
        <div class="ballot-header">
            <span style="font-size: 0.75rem; color: var(--text-muted);">VOTER SESSION TOKEN:</span>
            <span class="ballot-id" id="ballotToken">GENERATING...</span>
        </div>

        <h2 style="margin-bottom: 10px; text-align: left;">Verify Your Selection</h2>
        
        <div class="receipt-area" id="receiptList"></div>

        <div class="final-warning">
            ⚠️ Note: Once you click submit, your choices are final and cannot be changed.
        </div>

        <button onclick="submitVote()" id="submitBtn" style="margin-top: 20px;">Confirm & Submit Ballot</button>
    </div>

    <footer>© 2026 NTIC-KANO SRC Elections</footer>
</div>

<script>
const selections = JSON.parse(localStorage.getItem("selections") || "{}");

// Generate a random Ballot ID for Suggestion 1
function generateToken() {
    const chars = "ABCDEF0123456789";
    let token = "TX-";
    for(let i=0; i<6; i++) {
        token += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById("ballotToken").innerText = token;
}

function renderReceipt() {
    let html = "";
    for (let pos in selections) {
        html += `
        <div class="confirm-row">
            <div class="pos-info">
                <span class="pos-label">${pos}</span>
                <div class="candidate-val">${selections[pos]}</div>
            </div>
            <button class="edit-btn" onclick="goToEdit(this, '${pos}')">Change</button>
        </div>`;
    }
    document.getElementById("receiptList").innerHTML = html;
}

// Suggestion 2: Micro-interaction for the Change button
function goToEdit(btn, posName) {
    btn.innerText = "Opening...";
    btn.style.opacity = "0.7";
    localStorage.setItem("jumpToPosition", posName);
    localStorage.setItem("singleEditMode", "true"); 
    
    // Tiny delay to show the "Opening..." state
    setTimeout(() => {
        window.location.href = "vote.html";
    }, 400);
}

function submitVote() {
    const btn = document.getElementById("submitBtn");
    btn.innerText = "Encrypting & Storing...";
    btn.disabled = true;
    btn.style.background = "#1e293b";

    setTimeout(() => {
        let allVotes = JSON.parse(localStorage.getItem("allVotes") || "[]");
        let voter = localStorage.getItem("currentVoter");
        allVotes.push({voter: voter, selections: selections, timestamp: new Date()});
        localStorage.setItem("allVotes", JSON.stringify(allVotes));
        
        localStorage.removeItem("selections");
        localStorage.removeItem("currentVoter");
        
        window.location.href = "thankyou.html";
    }, 1200);
}

generateToken();
renderReceipt();
</script>
</body>
</html>
