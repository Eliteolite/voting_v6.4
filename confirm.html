<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review Your Ballot - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .receipt-area {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 10px 20px;
            margin: 20px 0;
        }
        .confirm-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0; /* Increased padding for better spacing */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
        }
        .confirm-row:last-child { border-bottom: none; }
        
        .pos-info { flex-grow: 1; padding-right: 15px; }

        /* IMPROVED POSITION VISIBILITY */
        .pos-label { 
            color: var(--primary); /* Cyan Blue */
            font-size: 0.9rem;      /* Larger text */
            font-weight: 800;      /* Extra Bold */
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin-bottom: 6px;    /* Space between title and name */
            display: block;
        }

        /* MUTED CANDIDATE NAME */
        .candidate-val { 
            font-size: 1.15rem; 
            font-weight: 400;      /* Lighter weight to make title pop */
            color: #f8fafc; 
        }
        
        .edit-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            width: auto;
            transition: all 0.2s;
        }
        .edit-btn:hover { 
            background: var(--primary); 
            color: #020617; 
            border-color: var(--primary);
        }
    </style>
</head>
<body>
<div class="container" style="max-width: 650px;">
    <header>
        <h1>NTIC - KANO</h1>
        <p>Review Your Selection</p>
    </header>

    <div class="card">
        <h2 style="margin-bottom: 10px;">Final Ballot Review</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Verify your choice for each position before submitting.</p>
        
        <div class="receipt-area" id="receiptList"></div>

        <button onclick="submitVote()" id="submitBtn" style="margin-top: 25px;">Cast My Final Vote</button>
        <p style="margin-top: 15px; font-size: 0.8rem; color: #34d399;">🔒 Your vote is private and encrypted.</p>
    </div>

    <footer>© 2026 NTIC-KANO SRC Elections</footer>
</div>

<script>
const selections = JSON.parse(localStorage.getItem("selections") || "{}");

function renderReceipt() {
    let html = "";
    for (let pos in selections) {
        html += `
        <div class="confirm-row">
            <div class="pos-info">
                <span class="pos-label">${pos}</span>
                <div class="candidate-val">${selections[pos]}</div>
            </div>
            <button class="edit-btn" onclick="goToEdit('${pos}')">Change</button>
        </div>`;
    }
    document.getElementById("receiptList").innerHTML = html;
}

function goToEdit(posName) {
    localStorage.setItem("jumpToPosition", posName);
    localStorage.setItem("singleEditMode", "true"); 
    window.location.href = "vote.html";
}

function submitVote() {
    const btn = document.getElementById("submitBtn");
    btn.innerText = "Encrypting & Submitting...";
    btn.disabled = true;

    setTimeout(() => {
        let allVotes = JSON.parse(localStorage.getItem("allVotes") || "[]");
        let voter = localStorage.getItem("currentVoter");
        allVotes.push({voter: voter, selections: selections});
        localStorage.setItem("allVotes", JSON.stringify(allVotes));
        
        localStorage.removeItem("selections");
        localStorage.removeItem("currentVoter");
        
        window.location.href = "thankyou.html";
    }, 1000);
}

renderReceipt();
</script>
</body>
</html>
