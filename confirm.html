<!DOCTYPE html>
<html>
<head><title>Confirm Vote</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
    <header><h1>NTIC - KANO</h1><p>Step 2: Review Your Ballot</p></header>
    <div class="card">
        <h2>Confirm Selections</h2>
        <div id="list" style="margin-bottom:20px;"></div>
        <button onclick="submit()">Finalize & Submit</button>
        <button onclick="history.back()" style="background:none; border:1px solid #334155; margin-top:10px;">Change Selections</button>
    </div>
</div>
<script>
const sel = JSON.parse(localStorage.getItem("selections") || "{}");
let h = "";
for(let k in sel) h += `<div style="text-align:left; padding:10px 0; border-bottom:1px solid #1e293b;"><small style="color:var(--primary)">${k}</small><div style="font-weight:600">${sel[k]}</div></div>`;
document.getElementById("list").innerHTML = h;

function submit(){
    let v = JSON.parse(localStorage.getItem("allVotes") || "[]");
    v.push({voter: localStorage.getItem("currentVoter"), selections: sel});
    localStorage.setItem("allVotes", JSON.stringify(v));
    window.location.href="thankyou.html";
}
</script>
</body>
</html>
