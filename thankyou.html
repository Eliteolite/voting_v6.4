<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vote Recorded - NTIC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .success-checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: rgba(52, 211, 153, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #34d399;
            font-size: 2.5rem;
            animation: pop 0.5s cubic-bezier(0.26, 0.53, 0.74, 1.48);
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .countdown {
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .timer-bar {
            width: 100%;
            height: 4px;
            background: #1e293b;
            margin-top: 10px;
            border-radius: 2px;
            overflow: hidden;
        }

        .timer-fill {
            height: 100%;
            background: var(--primary);
            width: 100%;
            animation: shrink 5s linear forwards;
        }

        @keyframes shrink {
            from { width: 100%; }
            to { width: 0%; }
        }
    </style>
</head>
<body>
<div class="container" style="max-width: 500px; margin-top: 15vh;">
    <div class="card">
        <div class="success-checkmark">✓</div>
        
        <h1 style="margin-bottom: 10px; color: #f8fafc;">Vote Submitted!</h1>
        <p style="color: var(--text-muted); line-height: 1.6;">
            Thank you for participating in the 2026 SRC Elections. Your choices have been encrypted and recorded successfully.
        </p>

        <div style="background: rgba(56, 189, 248, 0.05); border: 1px solid rgba(56, 189, 248, 0.1); padding: 15px; border-radius: 12px; margin-top: 25px;">
            <p style="color: var(--primary); font-size: 0.8rem; font-weight: 600;">SESSION SECURE</p>
            <p style="font-size: 0.85rem;">You have been logged out. The portal is ready for the next voter.</p>
        </div>

        <button onclick="window.location.href='index.html'" style="margin-top: 25px;">Back to Start</button>

        <div class="countdown">
            Redirecting to home in <span id="seconds">5</span> seconds...
            <div class="timer-bar">
                <div class="timer-fill"></div>
            </div>
        </div>
    </div>

    <footer>© 2026 NTIC-KANO. All rights reserved.</footer>
</div>

<script>
    // Countdown Timer Logic
    let timeLeft = 5;
    const timerElement = document.getElementById('seconds');
    
    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            window.location.href = 'index.html';
        }
    }, 1000);

    // Optional: Keep your original confetti function if you like it!
    function launchConfetti() {
        for(let i=0; i<50; i++) {
            let div = document.createElement('div');
            div.style.position = 'fixed';
            div.style.width = '6px';
            div.style.height = '6px';
            div.style.background = 'hsl(' + Math.random() * 360 + ', 100%, 50%)';
            div.style.top = '-10px';
            div.style.left = Math.random() * 100 + '%';
            div.style.borderRadius = '50%';
            div.style.zIndex = '999';
            document.body.appendChild(div);

            let speed = Math.random() * 3 + 2;
            let sideWay = (Math.random() - 0.5) * 4;
            let rotation = 0;

            function fall() {
                let top = parseFloat(div.style.top);
                let left = parseFloat(div.style.left);
                if (top < window.innerHeight) {
                    div.style.top = (top + speed) + 'px';
                    div.style.left = (left + sideWay) + 'px';
                    requestAnimationFrame(fall);
                } else {
                    div.remove();
                }
            }
            fall();
        }
    }
    launchConfetti();
</script>
</body>
</html>
