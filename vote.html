<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vote - NTIC Elections</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>NTIC - KANO</h1>
        <p>Official SRC Election Portal</p>
    </header>

    <div class="card" id="votingCard">
        </div>

    <footer>© 2026 NTIC-KANO SRC Elections</footer>
</div>

<script>
const positions = {
    "SRC Co-Leader": ["Kubura Mustapha", "Fatima Auwal Adam Sani", "Bilkisu Murtala"],
    "SRC Assist. Co-Leader": ["Rihanna Ahmad Abdulwahab", "Zainab Ismail Mai-Adamu", "Cindy Fechi Ohuruzo"],
    "Well-being Ambassador": ["Mufidah Nababa", "Ameerah Morenike Ibrahim", "Fatima Mai Hamza"],
    "SRC Secretary": ["Bilkisu Dauda Suleiman", "Fatima Mamman Farafara", "Fatima Tsofo", "Amatullah Lawal", "Halima Abdulqadir"],
    "Event Organizer": ["Yesmin Sadiq Bello", "Aisha Musta Ahmad", "Silakasi Nama Joshua", "Safiyta Bello Maiwada"],
    "Sports Captain": ["Favour Enewo Jimoh"],
    "Library Assistant": ["Zainab Mustapha", "Naila Sani", "Khadija Girgir", "Aisha Aliyu Musa"],
    "Hostel Coordinator": ["Asma'u Bala Getso", "Amina Amina Uzairu", "Ummu Salma Kabir Lawal"],
    "Dining Hall Coordinator": ["TBD - Candidate 1", "TBD - Candidate 2"],
    "School Ameerah": ["Aisha Bilyameen Gebe", "Amatur-Rahman Abdulqadir"],
    "School Sister": ["TBD - Candidate 1", "TBD - Candidate 2"]
};

const positionKeys = Object.keys(positions);
let currentIndex = 0;
let selections = JSON.parse(localStorage.getItem("selections") || "{}");

// LOGIC FOR QUICK-EDIT
const jumpTo = localStorage.getItem("jumpToPosition");
const isSingleEdit = localStorage.getItem("singleEditMode") === "true";

if (jumpTo && positionKeys.includes(jumpTo)) {
    currentIndex = positionKeys.indexOf(jumpTo);
}

function renderPosition() {
    const currentPos = positionKeys[currentIndex];
    const progressPercent = Math.round(((currentIndex) / positionKeys.length) * 100);
    
    let html = `
        <div style="margin-bottom: 30px;">
            <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 10px; font-weight: 600;">
                <span>${isSingleEdit ? 'QUICK EDIT MODE' : 'VOTING PROGRESS'}</span>
                <span>${currentIndex + 1} OF ${positionKeys.length}</span>
            </div>
            <div style="width: 100%; background: #1e293b; height: 6px; border-radius: 10px; overflow: hidden;">
                <div style="width: ${progressPercent}%; background: var(--primary); height: 100%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);"></div>
            </div>
        </div>
        
        <h2 style="text-align: left; margin-bottom: 10px;">${currentPos}</h2>
        <p style="text-align: left; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 25px;">Select one candidate from the list below.</p>
    `;

    positions[currentPos].forEach(name => {
        const isChecked = (selections[currentPos] === name) ? "checked" : "";
        html += `
        <label class="option" onclick="handleCardClick(this)">
            <span style="font-size: 1.1rem; font-weight: 500;">${name}</span>
            <input type="radio" name="candidate" value="${name}" ${isChecked}>
        </label>`;
    });

    const btnText = isSingleEdit ? "Save & Return to Summary" : (currentIndex === positionKeys.length - 1 ? "Review My Ballot" : "Continue to Next");
    
    html += `<button onclick="next()" style="margin-top: 20px;">${btnText}</button>`;
    document.getElementById("votingCard").innerHTML = html;
}

// Visual feedback when clicking the card itself
function handleCardClick(el) {
    document.querySelectorAll('.option').forEach(opt => opt.style.borderColor = 'rgba(255,255,255,0.08)');
    el.style.borderColor = 'var(--primary)';
    el.querySelector('input').checked = true;
}

function next() {
    const selected = document.querySelector('input[name="candidate"]:checked');
    if (!selected) {
        alert("Please make a selection to continue.");
        return;
    }
    
    selections[positionKeys[currentIndex]] = selected.value;
    localStorage.setItem("selections", JSON.stringify(selections));

    if (isSingleEdit) {
        localStorage.removeItem("singleEditMode");
        localStorage.removeItem("jumpToPosition");
        window.location.href = "confirm.html"; 
    } else {
        currentIndex++;
        if (currentIndex < positionKeys.length) {
            renderPosition();
        } else {
            window.location.href = "confirm.html";
        }
    }
}

renderPosition();
</script>
</body>
</html>
